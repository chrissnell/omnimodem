// Omnimodem control-plane API.
//
// Stability: package is versioned (omnimodem.v1). Within a major version,
// changes are ADDITIVE ONLY — see proto/VERSIONING.md. Field tags are never
// reused or renumbered.

syntax = "proto3";

package omnimodem.v1;

// Command-and-control plane for the Omnimodem software modem.
service ModemControl {
  // Create or update a virtual channel. Idempotent on channel id.
  rpc ConfigureChannel(ConfigureChannelRequest) returns (ConfigureChannelResponse);

  // Snapshot the current modem state (channels + status).
  rpc GetState(GetStateRequest) returns (ModemState);

  // Enqueue a frame for transmission on a channel. In Phase 1 this is
  // simulated: the core acknowledges with a transmit id and emits
  // TransmitStarted/TransmitComplete events. Returns once the frame is
  // accepted onto the channel's TX queue, not when it leaves the air.
  rpc Transmit(TransmitRequest) returns (TransmitResponse);

  // Subscribe to the event stream. The first message is always a snapshot
  // (Event.snapshot) reflecting state at subscription time; live events follow.
  rpc SubscribeEvents(SubscribeRequest) returns (stream Event);

  // Enumerate present audio/PTT-capable devices with their stable DeviceId.
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);

  // Bind a channel's audio to a device (by stable DeviceId) and open streams.
  rpc ConfigureAudio(ConfigureAudioRequest) returns (ConfigureAudioResponse);

  // Bind a channel's PTT to a device + method.
  rpc ConfigurePtt(ConfigurePttRequest) returns (ConfigurePttResponse);

  // Manually key/unkey a channel's PTT (operator test; no audio).
  rpc KeyPtt(KeyPttRequest) returns (KeyPttResponse);

  // Return ready-to-install udev rule text for a device (never writes it).
  rpc SuggestUdevRule(SuggestUdevRuleRequest) returns (SuggestUdevRuleResponse);
}

// ---------------------------------------------------------------------------
// Unary request/response
// ---------------------------------------------------------------------------

message ConfigureChannelRequest {
  uint32 channel = 1;     // logical channel id; reused id updates in place
  string name = 2;        // operator-facing label
  string mode = 3;        // Phase 1 placeholder, e.g. "none"
}

message ConfigureChannelResponse {
  uint32 channel = 1;
}

message GetStateRequest {}

message TransmitRequest {
  uint32 channel = 1;
  bytes payload = 2;      // opaque frame bytes; not interpreted in Phase 1
}

message TransmitResponse {
  uint64 transmit_id = 1; // monotonically increasing per process
}

message SubscribeRequest {}

// ---------------------------------------------------------------------------
// State snapshot
// ---------------------------------------------------------------------------

message ModemState {
  repeated ChannelInfo channels = 1;
}

message ChannelInfo {
  uint32 channel = 1;
  string name = 2;
  string mode = 3;
  string device_id = 4;   // stable device identity (placeholder in Phase 1)
  bool running = 5;
}

// ---------------------------------------------------------------------------
// Event stream
// ---------------------------------------------------------------------------

message Event {
  oneof kind {
    ModemState snapshot = 1;            // always first on a fresh subscription
    ChannelConfigured channel_configured = 2;
    TransmitStarted transmit_started = 3;
    TransmitComplete transmit_complete = 4;
    RxFrame rx_frame = 5;               // LOSSLESS class
    AudioLevel audio_level = 6;         // LOSSY class
    Status status = 7;                  // LOSSY class
    DeviceArrived device_arrived = 8;   // LOSSY
    DeviceDeparted device_departed = 9; // LOSSY
    PttState ptt_state = 10;            // LOSSY
  }
}

message ChannelConfigured { uint32 channel = 1; }

message TransmitStarted {
  uint32 channel = 1;
  uint64 transmit_id = 2;
}

message TransmitComplete {
  uint32 channel = 1;
  uint64 transmit_id = 2;
}

// A decoded RX frame. No DSP exists in Phase 1, so this is emitted only by
// tests/tools; it is defined now to pin the LOSSLESS backpressure contract.
message RxFrame {
  uint32 channel = 1;
  bytes data = 2;
  uint64 timestamp_ns = 3;
}

message AudioLevel {
  uint32 channel = 1;
  float dbfs = 2;
}

message Status {
  uint32 channel = 1;
  uint64 tx_frames = 2;
}

// ---------------------------------------------------------------------------
// Phase 2: devices, audio, PTT
// ---------------------------------------------------------------------------

message ListDevicesRequest {}

message DeviceInfo {
  string device_id = 1;   // canonical DeviceId string (see ids.rs)
  string label = 2;       // operator-facing name
  bool has_capture = 3;
  bool has_playback = 4;
}

message ListDevicesResponse {
  repeated DeviceInfo devices = 1;
}

message ConfigureAudioRequest {
  uint32 channel = 1;
  string device_id = 2;       // stable DeviceId; config keys on this
  uint32 sample_rate = 3;     // requested working rate (clamped to 48 kHz)
  uint32 fanout = 4;          // capture consumers; 0/1 == no fan-out
}

message ConfigureAudioResponse {
  uint32 actual_sample_rate = 1;  // rate the stream actually opened at
}

enum PttMethod {
  PTT_METHOD_UNSPECIFIED = 0;
  PTT_METHOD_NONE = 1;
  PTT_METHOD_VOX = 2;
  PTT_METHOD_SERIAL_RTS = 3;
  PTT_METHOD_SERIAL_DTR = 4;
  PTT_METHOD_CM108 = 5;
  PTT_METHOD_GPIO = 6;
  PTT_METHOD_RIGCTLD = 7;   // Hamlib rigctld over TCP (host:port in `node`)
  PTT_METHOD_ANDROID = 8;   // actuated by the Android/Kotlin USB layer (method int in `pin_or_line`)
}

message ConfigurePttRequest {
  uint32 channel = 1;
  string device_id = 2;       // stable DeviceId for the PTT device
  PttMethod method = 3;
  string node = 4;            // resolved node / chip path (serial/cm108/gpio)
  uint32 pin_or_line = 5;     // cm108 GPIO pin (1-8) or gpiochip line offset
  bool invert = 6;
}

message ConfigurePttResponse {}

message KeyPttRequest {
  uint32 channel = 1;
  bool keyed = 2;             // true=key, false=unkey
}

message KeyPttResponse {}

message SuggestUdevRuleRequest {
  string device_id = 1;
}

message SuggestUdevRuleResponse {
  string rule = 1;            // udev rule text
  string instructions = 2;    // where to put it
}

message DeviceArrived {
  string device_id = 1;
  string label = 2;
}

message DeviceDeparted {
  string device_id = 1;
}

message PttState {
  uint32 channel = 1;
  bool keyed = 2;
}
