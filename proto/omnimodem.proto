// Omnimodem control-plane API.
//
// Stability: package is versioned (omnimodem.v1). Within a major version,
// changes are ADDITIVE ONLY — see proto/VERSIONING.md. Field tags are never
// reused or renumbered.

syntax = "proto3";

package omnimodem.v1;

// Command-and-control plane for the Omnimodem software modem.
service ModemControl {
  // Create or update a virtual channel. Idempotent on channel id.
  rpc ConfigureChannel(ConfigureChannelRequest) returns (ConfigureChannelResponse);

  // Snapshot the current modem state (channels + status).
  rpc GetState(GetStateRequest) returns (ModemState);

  // Enqueue a frame for transmission on a channel. In Phase 1 this is
  // simulated: the core acknowledges with a transmit id and emits
  // TransmitStarted/TransmitComplete events. Returns once the frame is
  // accepted onto the channel's TX queue, not when it leaves the air.
  rpc Transmit(TransmitRequest) returns (TransmitResponse);

  // Subscribe to the event stream. The first message is always a snapshot
  // (Event.snapshot) reflecting state at subscription time; live events follow.
  rpc SubscribeEvents(SubscribeRequest) returns (stream Event);

  // Enumerate present audio/PTT-capable devices with their stable DeviceId.
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);

  // Bind a channel's audio to a device (by stable DeviceId) and open streams.
  rpc ConfigureAudio(ConfigureAudioRequest) returns (ConfigureAudioResponse);

  // Bind a channel's PTT to a device + method.
  rpc ConfigurePtt(ConfigurePttRequest) returns (ConfigurePttResponse);

  // Manually key/unkey a channel's PTT (operator test; no audio).
  rpc KeyPtt(KeyPttRequest) returns (KeyPttResponse);

  // Return ready-to-install udev rule text for a device (never writes it).
  rpc SuggestUdevRule(SuggestUdevRuleRequest) returns (SuggestUdevRuleResponse);

  // Snapshot per-channel metrics (decode counts, SNR, levels, DCD, AFC).
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);

  // Acquire/release a channel's exclusive TX lease on its bound rig.
  rpc AcquireTxLease(TxLeaseRequest) returns (TxLeaseResponse);
  rpc ReleaseTxLease(TxLeaseRequest) returns (TxLeaseResponse);

  // Start or stop an in-daemon KISS-over-TCP listener for a packet channel,
  // so legacy TNC apps (Direwolf, APRX, pat, Xastir) speak KISS to omnimodem.
  // The channel must be a packet mode (AFSK 1200 AX.25).
  rpc ConfigureKissListener(ConfigureKissListenerRequest) returns (ConfigureKissListenerResponse);

  // Adjust a channel's RX input gain and TX output gain at runtime. Linear
  // multipliers (1.0 == unity); takes effect on the running workers.
  rpc SetAudioGain(SetAudioGainRequest) returns (SetAudioGainResponse);

  // Enable/disable and size a channel's spectrum (waterfall) stream. Default OFF
  // so the FFT costs nothing when no one is watching. Echoes the actual clamped
  // params; takes effect on the running RX worker. Idempotent per channel.
  rpc ConfigureSpectrum(ConfigureSpectrumRequest) returns (ConfigureSpectrumResponse);
}

// ---------------------------------------------------------------------------
// Unary request/response
// ---------------------------------------------------------------------------

message ConfigureChannelRequest {
  uint32 channel = 1;     // logical channel id; reused id updates in place
  string name = 2;        // operator-facing label
  // Mode selector. A bare label ("cw", "ft8", "psk31") resolves with default
  // parameters; a parametric form ("cw:wpm=25,tone=600") overrides individual
  // params. Prefer the typed `mode_params` below for parametric modes — when set,
  // it is authoritative and supplies both the mode and its parameters.
  string mode = 3;
  // Optional structured per-mode parameters (channel-config protocol expansion).
  // When present, its oneof variant selects the mode and its values; `mode` is
  // then ignored. Absent ⇒ the `mode` string is used as-is (backward compatible).
  ModeParams mode_params = 4;
}

// Typed per-mode parameters. The set oneof variant selects the mode.
message ModeParams {
  oneof params {
    CwParams cw = 1;
    RttyParams rtty = 2;
    Psk31Params psk31 = 3;
    OliviaParams olivia = 4;
    Afsk1200Params afsk1200 = 5;
    PskParams psk = 6;
  }
}

message CwParams {
  uint32 wpm = 1;       // words per minute
  float  tone_hz = 2;   // sidetone / mark frequency
}

message RttyParams {
  float baud = 1;       // symbol rate (e.g. 45.45)
  float shift_hz = 2;   // mark/space shift (e.g. 170)
  float center_hz = 3;  // audio center; 0 ⇒ default (2210 Hz, US ham RTTY)
  bool  reverse = 4;    // swap mark/space (reverse RTTY; depends on sideband)
}

message Psk31Params {
  float center_hz = 1;  // audio center frequency
}

// The full fldigi PSK family (psk31/63/125/250/500/1000 and, as they land, the
// QPSK/+F/robust submodes). `submode` is the mode label; `center_hz` the audio
// carrier. Supersedes Psk31Params, which remains for legacy clients.
message PskParams {
  string submode = 1;   // psk::PskVariant label, e.g. "psk125"
  float  center_hz = 2; // audio center frequency
}

message OliviaParams {
  uint32 tones = 1;         // number of tones (e.g. 32)
  uint32 bandwidth_hz = 2;  // bandwidth in Hz (e.g. 1000)
}

message Afsk1200Params {
  bool tx = 1;          // enable the transmit modulator
}

message ConfigureChannelResponse {
  uint32 channel = 1;
}

message GetStateRequest {}

message TransmitRequest {
  uint32 channel = 1;
  bytes payload = 2;      // opaque frame bytes; not interpreted in Phase 1
}

message TransmitResponse {
  uint64 transmit_id = 1; // monotonically increasing per process
}

message SubscribeRequest {}

// ---------------------------------------------------------------------------
// State snapshot
// ---------------------------------------------------------------------------

message ModemState {
  repeated ChannelInfo channels = 1;
}

message ChannelInfo {
  uint32 channel = 1;
  string name = 2;
  string mode = 3;
  string device_id = 4;        // stable RX (capture) device identity
  bool running = 5;
  string tx_device_id = 6;     // TX (playback) device; empty == same as RX
  string ptt_device_id = 7;    // PTT device; empty when deviceless (None/Vox) or unset
  PttMethod ptt_method = 8;    // configured PTT method (UNSPECIFIED if unset)
}

// ---------------------------------------------------------------------------
// Event stream
// ---------------------------------------------------------------------------

message Event {
  oneof kind {
    ModemState snapshot = 1;            // always first on a fresh subscription
    ChannelConfigured channel_configured = 2;
    TransmitStarted transmit_started = 3;
    TransmitComplete transmit_complete = 4;
    RxFrame rx_frame = 5;               // LOSSLESS class
    AudioLevel audio_level = 6;         // LOSSY class
    Status status = 7;                  // LOSSY class
    DeviceArrived device_arrived = 8;   // LOSSY
    DeviceDeparted device_departed = 9; // LOSSY
    PttState ptt_state = 10;            // LOSSY
    ClockOffset clock_offset = 11;      // LOSSY
    ChannelMetrics channel_metrics = 12; // LOSSY
    SpectrumFrame spectrum_frame = 13;   // LOSSY class
  }
}

// One waterfall line: a magnitude spectrum over the channel's audio passband.
// LOSSY class — a lagging subscriber drops lines (a missed line is invisible).
// The renderer needs nothing beyond these fields: map each uint8 bin to a shade,
// and label the X axis from freq_start_hz / freq_step_hz.
message SpectrumFrame {
  uint32 channel       = 1;
  uint64 timestamp_ns  = 2;   // wall-clock of the window's leading edge (0 if unknown)
  float  freq_start_hz = 3;   // center frequency of bin[0]
  float  freq_step_hz  = 4;   // Hz per output bin
  float  db_floor      = 5;   // dBFS mapped to bin value 0
  float  db_ceiling    = 6;   // dBFS mapped to bin value 255
  bytes  bins          = 7;   // uint8 quantized dBFS, len == bin_count, low->high freq
  bool   transmit      = 8;   // true: transmitted (TX) spectrum; false: received (RX)
}

message ChannelConfigured { uint32 channel = 1; }

// Host clock-discipline metric (windowed modes need an accurate clock).
message ClockOffset {
  double offset_s = 1;      // NTP offset estimate (seconds)
  double est_error_s = 2;   // estimated error (seconds)
  bool synchronized = 3;    // kernel reports the clock as synchronized
}

message TransmitStarted {
  uint32 channel = 1;
  uint64 transmit_id = 2;
}

message TransmitComplete {
  uint32 channel = 1;
  uint64 transmit_id = 2;
}

// A decoded RX frame. No DSP exists in Phase 1, so this is emitted only by
// tests/tools; it is defined now to pin the LOSSLESS backpressure contract.
message RxFrame {
  uint32 channel = 1;
  bytes data = 2;
  uint64 timestamp_ns = 3;
}

message AudioLevel {
  uint32 channel = 1;
  float dbfs = 2;
}

message Status {
  uint32 channel = 1;
  uint64 tx_frames = 2;
}

// ---------------------------------------------------------------------------
// Phase 2: devices, audio, PTT
// ---------------------------------------------------------------------------

message ListDevicesRequest {}

message DeviceInfo {
  string device_id = 1;   // canonical DeviceId string (see ids.rs)
  string label = 2;       // operator-facing name
  bool has_capture = 3;
  bool has_playback = 4;
}

message ListDevicesResponse {
  repeated DeviceInfo devices = 1;
}

message ConfigureAudioRequest {
  uint32 channel = 1;
  string device_id = 2;       // capture (RX) device; config keys on this
  uint32 sample_rate = 3;     // requested RX working rate (clamped to 48 kHz)
  uint32 fanout = 4;          // capture consumers; 0/1 == no fan-out
  // Optional split playback (TX) device. Empty == use `device_id` (the common
  // single-rig case). Set to bind capture and playback to different cards.
  string tx_device_id = 5;
  uint32 tx_sample_rate = 6;  // requested TX working rate; 0 == same as sample_rate
}

message ConfigureAudioResponse {
  uint32 actual_sample_rate = 1;     // rate the capture stream actually opened at
  uint32 actual_tx_sample_rate = 2;  // rate the playback stream actually opened at
}

enum PttMethod {
  PTT_METHOD_UNSPECIFIED = 0;
  PTT_METHOD_NONE = 1;
  PTT_METHOD_VOX = 2;
  PTT_METHOD_SERIAL_RTS = 3;
  PTT_METHOD_SERIAL_DTR = 4;
  PTT_METHOD_CM108 = 5;
  PTT_METHOD_GPIO = 6;
}

message ConfigurePttRequest {
  uint32 channel = 1;
  string device_id = 2;       // stable DeviceId for the PTT device
  PttMethod method = 3;
  string node = 4;            // resolved node / chip path (serial/cm108/gpio)
  uint32 pin_or_line = 5;     // cm108 GPIO pin (1-8) or gpiochip line offset
  bool invert = 6;
}

message ConfigurePttResponse {}

message KeyPttRequest {
  uint32 channel = 1;
  bool keyed = 2;             // true=key, false=unkey
}

message KeyPttResponse {}

message SuggestUdevRuleRequest {
  string device_id = 1;
}

message SuggestUdevRuleResponse {
  string rule = 1;            // udev rule text
  string instructions = 2;    // where to put it
}

message DeviceArrived {
  string device_id = 1;
  string label = 2;
}

message DeviceDeparted {
  string device_id = 1;
}

message PttState {
  uint32 channel = 1;
  bool keyed = 2;
}

// ---------------------------------------------------------------------------
// Phase 5: per-channel metrics & observability
// ---------------------------------------------------------------------------

message GetMetricsRequest {
  uint32 channel = 1;   // 0 == all channels
}

message GetMetricsResponse {
  repeated ChannelMetrics metrics = 1;
}

message ChannelMetrics {
  uint32 channel = 1;
  uint64 good_frames = 2;
  uint64 bad_frames = 3;
  float snr_db = 4;
  float dbfs = 5;
  float afc_offset_hz = 6;
  bool dcd = 7;
  string last_decoder = 8;
}

message TxLeaseRequest { uint32 channel = 1; }

message TxLeaseResponse {
  bool granted = 1;       // false on Acquire if another channel holds it
  uint32 held_by = 2;     // the current holder when granted == false (0 if none)
}

// ---------------------------------------------------------------------------
// Phase 6: KISS<->gRPC translator
// ---------------------------------------------------------------------------

message ConfigureKissListenerRequest {
  uint32 channel = 1;
  string bind_addr = 2;   // "host:port", e.g. "127.0.0.1:8001"; ":0" picks a port
  bool enable = 3;        // true = start/replace; false = stop (bind_addr ignored)
}

message ConfigureKissListenerResponse {
  string bound_addr = 1;  // actual bound "host:port" when enabled (empty when stopped)
  bool active = 2;        // whether a listener is now running for the channel
}

message SetAudioGainRequest {
  uint32 channel = 1;
  float rx_gain = 2;   // capture gain, linear (1.0 == unity)
  float tx_gain = 3;   // playback gain, linear (1.0 == unity)
}

message SetAudioGainResponse {}

message ConfigureSpectrumRequest {
  uint32 channel    = 1;
  bool   enable     = 2;   // false = stop the producer (other fields ignored)
  uint32 bin_count  = 3;   // output bins (display width); 0 = server default (256)
  uint32 fft_size   = 4;   // FFT length; 0 = server default (2048), rounded to pow2
  uint32 rate_hz    = 5;   // target lines/sec; 0 = server default (15)
  float  freq_lo_hz = 6;   // passband window low edge; 0 = 0 Hz
  float  freq_hi_hz = 7;   // passband window high edge; 0 = Nyquist (native_rate/2)
}

message ConfigureSpectrumResponse {
  uint32 bin_count     = 1;  // actual, after clamping to available FFT bins
  uint32 fft_size      = 2;  // actual (power of two)
  uint32 rate_hz       = 3;  // actual achievable lines/sec (see hop constraint)
  float  freq_start_hz = 4;  // matches SpectrumFrame.freq_start_hz
  float  freq_step_hz  = 5;  // matches SpectrumFrame.freq_step_hz
}
