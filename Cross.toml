# cross-rs config for building omnimodemd on Linux non-native targets.
#
# omnimodemd links cpal (ALSA) and, on Linux, hidapi/gpiocdev (libudev), and its
# build.rs runs tonic-build which needs `protoc`. Each per-target pre-build
# installs the cross-arch dev libs + a protoc into the cross container.
#
# Cross compilation of alsa-sys / libudev-sys goes through pkg-config; when the
# host arch != target arch, pkg-config-rs refuses to look anywhere unless
# PKG_CONFIG_ALLOW_CROSS=1 is set and PKG_CONFIG_PATH_<triple> points at the
# target arch's multi-arch pkgconfig dir. release.yml supplies both env vars
# from the host runner; the passthrough block below lets them through.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64 && apt-get update && apt-get install -y libasound2-dev:arm64 libudev-dev:arm64 unzip && curl -Lo /tmp/protoc.zip https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip && unzip -o /tmp/protoc.zip -d /usr/local bin/protoc && chmod +x /usr/local/bin/protoc && rm /tmp/protoc.zip",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS",
    "PKG_CONFIG_PATH_aarch64_unknown_linux_gnu",
    "CFLAGS_aarch64_unknown_linux_gnu",
]

# Optional 32-bit ARMv7-A hard-float (Cortex-A7+). Same arm-linux-gnueabihf
# multi-arch tuple, so the :armhf dev packages and pkgconfig dir are shared;
# only the Rust triple (and thus the per-triple env var names) differ.
[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture armhf && apt-get update && apt-get install -y libasound2-dev:armhf libudev-dev:armhf unzip && curl -Lo /tmp/protoc.zip https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip && unzip -o /tmp/protoc.zip -d /usr/local bin/protoc && chmod +x /usr/local/bin/protoc && rm /tmp/protoc.zip",
]

[target.armv7-unknown-linux-gnueabihf.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS",
    "PKG_CONFIG_PATH_armv7_unknown_linux_gnueabihf",
    "CFLAGS_armv7_unknown_linux_gnueabihf",
]
