name: CI

# Build, test, and lint the Rust workspace. The local agent sandbox can't reliably
# run long builds, so CI is the source of truth — verify changes here.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # protoc: tonic-build compiles proto/omnimodem.proto at build time.
        # libasound2-dev: cpal links ALSA on Linux.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler libasound2-dev pkg-config

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build & test (workspace)
        run: cargo test --workspace --locked

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
