name: CI

# Build, test, and lint the Rust workspace. The local agent sandbox can't reliably
# run long builds, so CI is the source of truth — verify changes here.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # protoc: tonic-build compiles proto/omnimodem.proto at build time.
        # libasound2-dev: cpal links ALSA on Linux.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler libasound2-dev pkg-config

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build & test (workspace)
        run: cargo test --workspace --locked

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  tui:
    name: tui (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install protoc + plugins
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate + vet + test
        working-directory: clients/omnimodem-tui
        run: |
          ./gen.sh
          go vet ./...
          go test ./...
